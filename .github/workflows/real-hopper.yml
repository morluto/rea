name: Real Hopper E2E

on:
  workflow_dispatch:
    inputs:
      first_target:
        description: Absolute path to first test binary on the runner
        required: true
        type: string
      second_target:
        description: Absolute path to distinct second test binary on the runner
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify:
    name: Installed package against real Hopper
    runs-on: [self-hosted, macOS, hopper]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run rebuild:native
      - name: Install packed CLI in isolation
        shell: bash
        run: |
          tarball="$(npm pack --silent)"
          prefix="${RUNNER_TEMP}/rea-prefix"
          npm install --global --prefix "${prefix}" "./${tarball}"
          echo "REA_VERIFY_SERVER_COMMAND=${prefix}/bin/rea" >> "${GITHUB_ENV}"
          echo 'REA_VERIFY_SERVER_ARGS_JSON=["mcp"]' >> "${GITHUB_ENV}"
      - name: Verify two real binaries
        env:
          HOPPER_TARGET_PATH: ${{ inputs.first_target }}
          HOPPER_SECOND_TARGET_PATH: ${{ inputs.second_target }}
        run: npm run verify:hopper
