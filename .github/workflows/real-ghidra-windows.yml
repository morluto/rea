name: Real Ghidra Windows E2E

on:
  repository_dispatch:
    types: [real-ghidra-windows]

env:
  HUSKY: "0"

permissions:
  contents: read

jobs:
  verify:
    name: Real Ghidra 12.1.2 Windows x64 PE proof
    if: github.ref == 'refs/heads/main'
    environment: real-ghidra-windows
    runs-on: [self-hosted, Windows, x64, ghidra-12-1-2]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: npm ci
      - name: Verify all admitted Windows Ghidra operations
        env:
          REA_ANALYSIS_PROVIDER: ghidra
        run: npm run verify:ghidra:windows | Tee-Object -FilePath windows-ghidra-proof.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-ghidra-proof
          path: windows-ghidra-proof.log
          retention-days: 30
