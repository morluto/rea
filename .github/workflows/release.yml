name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to npm
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Verify build
        run: npm run build

      - name: Publish
        run: npm publish --access public

      - name: Verify published CLI from npm
        shell: bash
        run: |
          version="$(node --input-type=module -e 'import packageJson from "./package.json" with { type: "json" }; process.stdout.write(packageJson.version)')"
          for attempt in 1 2 3 4 5 6; do
            if npm view "rea-agents@${version}" version --json >/dev/null 2>&1; then
              npx --yes --package "rea-agents@${version}" rea --help
              npx --yes --package "rea-agents@${version}" rea --llms
              npm run verify:published -- "${version}"
              exit 0
            fi
            if [ "${attempt}" -lt 6 ]; then sleep 10; fi
          done
          echo "Published rea-agents@${version} was not available from npm" >&2
          exit 1
