name: Real Hopper Linux E2E

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fixtures:
    name: Build source-owned Hopper fixtures
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run verify:fixtures
      - uses: actions/upload-artifact@v4
        with:
          name: hopper-conformance-fixtures
          path: build/conformance
          if-no-files-found: error
          retention-days: 7

  clean-setup:
    name: Clean setup, CLI, and MCP
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Pack CLI for setup verification
        shell: bash
        run: |
          tarball="$(npm pack --silent)"
          prefix="${RUNNER_TEMP}/rea-prefix"
          npm install --global --prefix "${prefix}" "./${tarball}"
          echo "REA_VERIFY_SERVER_COMMAND=${prefix}/bin/rea" >> "${GITHUB_ENV}"
      - name: Verify clean Linux setup through CLI and MCP
        run: sudo --preserve-env=REA_VERIFY_SERVER_COMMAND,PATH npm run verify:setup:linux

  verify:
    name: Installed package against real Linux Hopper
    needs: fixtures
    runs-on: [self-hosted, Linux, hopper]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: hopper-conformance-fixtures
          path: build/conformance
      - name: Install packed CLI in isolation
        shell: bash
        run: |
          tarball="$(npm pack --silent)"
          prefix="${RUNNER_TEMP}/rea-prefix"
          npm install --global --ignore-scripts --prefix "${prefix}" "./${tarball}"
          echo "REA_VERIFY_SERVER_COMMAND=${prefix}/bin/rea" >> "${GITHUB_ENV}"
          echo 'REA_VERIFY_SERVER_ARGS_JSON=["mcp"]' >> "${GITHUB_ENV}"
      - name: Verify source-owned fixtures through an alternate launcher symlink
        env:
          REA_HOPPER_CONFORMANCE_MANIFEST_PATH: ${{ github.workspace }}/build/conformance/manifest.json
        run: npm run verify:hopper:linux
