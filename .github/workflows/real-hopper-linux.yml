name: Real Hopper Linux E2E

on:
  workflow_dispatch:
    inputs:
      first_target:
        description: Absolute path to first Linux test binary
        required: true
        type: string
      second_target:
        description: Absolute path to a distinct Linux test binary
        required: true
        type: string

permissions:
  contents: read

jobs:
  clean-setup:
    name: Clean setup, CLI, and MCP
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Pack CLI for setup verification
        shell: bash
        run: |
          tarball="$(npm pack --silent)"
          prefix="${RUNNER_TEMP}/rea-prefix"
          npm install --global --prefix "${prefix}" "./${tarball}"
          echo "REA_VERIFY_SERVER_COMMAND=${prefix}/bin/rea" >> "${GITHUB_ENV}"
      - name: Verify clean Linux setup through CLI and MCP
        run: sudo --preserve-env=REA_VERIFY_SERVER_COMMAND,PATH npm run verify:setup:linux

  verify:
    name: Installed package against real Linux Hopper
    runs-on: [self-hosted, Linux, hopper]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Install packed CLI in isolation
        shell: bash
        run: |
          tarball="$(npm pack --silent)"
          prefix="${RUNNER_TEMP}/rea-prefix"
          npm install --global --ignore-scripts --prefix "${prefix}" "./${tarball}"
          echo "REA_VERIFY_SERVER_COMMAND=${prefix}/bin/rea" >> "${GITHUB_ENV}"
          echo 'REA_VERIFY_SERVER_ARGS_JSON=["mcp"]' >> "${GITHUB_ENV}"
      - name: Verify two binaries through an alternate launcher symlink
        env:
          HOPPER_TARGET_PATH: ${{ inputs.first_target }}
          HOPPER_SECOND_TARGET_PATH: ${{ inputs.second_target }}
        run: npm run verify:hopper:linux
